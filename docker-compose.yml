services:
  proxy:
    image: ghcr.io/berriai/litellm:main-v1.82.6
    user: "${HOST_UID}:${HOST_GID}"
    cap_drop:
      - ALL
    env_file:
      - .secrets.env
    environment:
      - HOME=/tmp
      - LITELLM_NON_ROOT=true
      - LITELLM_MASTER_KEY=${DYNAMIC_AGENT_KEY}
      - LITELLM_LOG=ERROR  # Reduces log noise to only critical errors
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount the config directly into /tmp
      - ./proxy_config.yaml:/tmp/config.yaml:ro
    # Tell LiteLLM to read the config from the new /tmp location
    command: ["--config", "/tmp/config.yaml"]
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - internet_access  # To reach LLM providers
      - agent_internal   # To reach the Aider agent

  agent:
    image: paulgauthier/aider-full
    depends_on:
      - proxy
    user: "${HOST_UID}:${HOST_GID}"
    cap_drop:
      - ALL
    environment:
      # We told Aider its home is /tmp...
      - HOME=/tmp
      - OPENAI_API_KEY=${DYNAMIC_AGENT_KEY}
      - OPENAI_API_BASE=http://proxy:4000/v1
      - AIDER_ANALYTICS=false
    volumes:
      - ./src:/app/src:rw
      # ...so we mount the config file directly into its new home!
      - ./agent_settings.yml:/tmp/.aider.conf.yml:ro
      - ./prompts.md:/tmp/prompts.md:ro
    working_dir: /app/src
    networks:
      - agent_internal   # Restricted: No internet access
    stdin_open: true 
    tty: true

networks:
  internet_access:
    driver: bridge
  # This network is isolated; no gateway to the internet
  agent_internal:
    driver: bridge
    internal: true